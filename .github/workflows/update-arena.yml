name: Update Arena Data

on:
  schedule:
    - cron: '0 8 * * 1'  # Toda segunda-feira às 08:00 UTC
  workflow_dispatch:       # Permite trigger manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary supabase python-dateutil

      - name: Generate and upload arena data
        env:
          HAMILTON_DB_URL: ${{ secrets.HAMILTON_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/generate_arena_data.py
